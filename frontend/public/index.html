<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Enterprise Incident Management System — Submit and track IT incidents in real time." />
  <title>Enterprise Incident Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- TailwindCSS v3 via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            pink: {
              50: '#FFF5FA',  /* Background */
              100: '#FFE4F1', /* Light Pink */
              200: '#FFC1E3', /* Soft Pink */
              400: '#FF6EB4', /* Accent Pink */
              500: '#FF4FA3', /* Primary Pink */
              900: '#3A0B2E', /* Dark Text */
            },
            glass: 'rgba(255, 255, 255, 0.65)',
            glassDark: 'rgba(255, 255, 255, 0.85)',
          },
          boxShadow: {
            'soft': '0 10px 25px -5px rgba(255, 79, 163, 0.1), 0 8px 10px -6px rgba(255, 79, 163, 0.1)',
            'glow': '0 0 15px rgba(255, 79, 163, 0.4)',
          }
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #FFF5FA; color: #3A0B2E; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    
    /* Glassmorphism utility */
    .glass-card { 
      background: rgba(255, 255, 255, 0.7); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
      border: 1px solid rgba(255, 255, 255, 0.4); 
    }
    
    /* Pretty Gradient Text */
    .text-gradient {
      background: linear-gradient(to right, #FF4FA3, #FF6EB4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #FFC1E3; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #FF4FA3; }
  </style>
</head>
<body class="bg-pink-50 text-pink-900 antialiased selection:bg-pink-200 selection:text-pink-900">
  <div id="root"></div>
</body>
</html>
